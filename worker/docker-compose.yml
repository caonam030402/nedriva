services:

  # ── Redis (job queue + job state storage) ──────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API server (no GPU needed) ─────────────────────────────
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - model_cache:/app/models
    # CPU-only image — no GPU needed to serve HTTP requests
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  # ── Worker (GPU-enabled, runs the actual AI processing) ────
  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - model_cache:/app/models
    # Uncomment on GPU server:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    command: python worker.py

volumes:
  redis_data:
  model_cache:    # shared between api and worker for downloaded model weights
